s is “y = 1”, a horizontal line function and the second of these functions is “y = -1”, another horizontal line function. The function “y = tanh(x)” is always between these two functions without ever touching them. The sixth graph is of the function “y = coth(x)”. On the left side of the y axis, the function starts slightly below the boundary line “y = 1” and decreases until it approaches the y axis, which it never touches. On the right side of the y axis, the function starts slightly to the right of the y axis and decreases until it approaches the boundary line “y = -1”, which it never touches."'></div>
